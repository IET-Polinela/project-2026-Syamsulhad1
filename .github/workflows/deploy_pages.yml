name: Deploy Frontend SPA to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload SPA
        uses: actions/upload-pages-artifact@v3
        with:
          path: './smartcity_citizen_spa_24782031'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4