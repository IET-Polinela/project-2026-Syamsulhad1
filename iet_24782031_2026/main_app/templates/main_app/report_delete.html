<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hapus Laporan — SmartReport</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --dark: #0c1220; --gray-200: #e2e8f0; --gray-500: #64748b;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; min-height: 100vh; margin: 0; background: #fff; }
    
    main { max-width: 450px; margin: auto; padding: 40px; text-align: center; animation: fadeUp 0.5s ease; }
    .icon-box { width: 64px; height: 64px; background: #fef2f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon-box svg { color: #ef4444; width: 32px; height: 32px; }
    
    h1 { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: 12px; }
    p { color: var(--gray-500); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    b { color: var(--dark); border-bottom: 2px solid #fee2e2; }

    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    .btn { padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 0.9rem; border: none; }
    .btn-danger { background: #ef4444; color: white; box-shadow: 0 4px 12px rgba(239,68,68,0.2); }
    .btn-secondary { background: #f1f5f9; color: var(--gray-500); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<main>
  <div class="icon-box">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
  </div>
  <h1>Hapus Laporan?</h1>
  <p>Anda akan menghapus laporan <br><b>"{{ report.title }}"</b>.<br>Tindakan ini permanen dan tidak bisa dibatalkan.</p>
  
  <form method="POST">
    {% csrf_token %}
    <div class="btn-group">
      <button type="submit" class="btn btn-danger">Ya, Hapus Sekarang</button>
      <a href="{% url 'report_list' %}" class="btn btn-secondary">Batalkan</a>
    </div>
  </form>
</main>

</body>
</html>
