<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Laporan — SmartReport</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* CSS DASAR DARI HOME.HTML */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #ffffff; color: #000000; min-height: 100vh; display: flex; flex-direction: column; }
    
    nav { background: #ffffff; border-bottom: 1px solid #cccccc; padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 700; font-size: 1.1rem; color: #000000; text-decoration: none; }
    .logo span { color: #87ceeb; }
    nav ul { list-style: none; display: flex; gap: 28px; }
    nav ul a { text-decoration: none; color: #000000; font-size: 0.88rem; transition: color 0.2s; }
    nav ul a:hover { color: #87ceeb; }

    main { max-width: 600px; margin: 60px auto; padding: 0 20px; flex: 1; width: 100%; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 24px; text-align: center; }
    h1 span { color: #87ceeb; }

    /* STYLING FORM */
    form { background: #f9f9f9; padding: 30px; border-radius: 8px; border: 1px solid #eeeeee; }
    form p { margin-bottom: 15px; }
    form label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; color: #333; }
    form input, form textarea, form select { 
      width: 100%; padding: 10px; border: 1px solid #cccccc; border-radius: 4px; font-family: inherit; font-size: 0.9rem;
    }
    form input:focus { border-color: #87ceeb; outline: none; }

    .btn-container { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 12px; border-radius: 4px; font-weight: 600; text-align: center; text-decoration: none; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-save { background: #87ceeb; color: white; }
    .btn-save:hover { background: #00bfff; }
    .btn-cancel { background: transparent; border: 1px solid #cccccc; color: #666; }

    footer { border-top: 1px solid #cccccc; padding: 22px 40px; text-align: center; font-size: 0.76rem; color: #333333; margin-top: auto; }
    footer span { color: #87ceeb; }
  </style>
</head>
<body>

<nav>
  <a href="{% url 'home' %}" class="logo">Smart<span>Report</span></a>
  <ul>
    <li><a href="{% url 'home' %}">Home</a></li>
    <li><a href="{% url 'about' %}">About</a></li>
    <li><a href="{% url 'contacts' %}">Contacts</a></li>
  </ul>
</nav>

<main>
  <h1>Isi <span>Laporan</span></h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="btn-container">
      <button type="submit" class="btn btn-save">Simpan Laporan</button>
      <a href="{% url 'report_list' %}" class="btn btn-cancel">Batal</a>
    </div>
  </form>
</main>

<footer>© 2026 <span>SmartReport</span> — Sistem Pelaporan Kota Konoha</footer>

</body>
</html>
