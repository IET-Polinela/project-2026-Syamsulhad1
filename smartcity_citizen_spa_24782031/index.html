<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - SmartReport</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Atkinson+Hyperlegible+Next:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        (function () {
            const savedTheme = localStorage.getItem("smartreport_theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        })();
    </script>
    <style>
        :root {
            --brand: #0ea5e9;
            --brand-deep: #0284c7;
            --brand-dark: #0369a1;
            --brand-pale: #e0f2fe;
            --accent: #06b6d4;
            --dark: #0c1220;
            --dark-mid: #1e293b;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-700: #334155;
            --grad-brand: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            --shadow-md: 0 4px 16px rgba(14,165,233,0.12), 0 2px 8px rgba(0,0,0,0.08);
            --shadow-panel: 0 10px 28px rgba(15, 23, 42, 0.08);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --brand: #38bdf8;
            --brand-deep: #7dd3fc;
            --brand-dark: #bae6fd;
            --brand-pale: #0c2f44;
            --accent: #22d3ee;
            --dark: #f8fafc;
            --dark-mid: #cbd5e1;
            --white: #111827;
            --gray-50: #0b1120;
            --gray-100: #111827;
            --gray-200: #243244;
            --gray-400: #64748b;
            --gray-500: #94a3b8;
            --gray-700: #dbeafe;
            --grad-brand: linear-gradient(135deg, #0ea5e9 0%, #22d3ee 100%);
            --shadow-md: 0 12px 34px rgba(0, 0, 0, 0.28);
            --shadow-panel: 0 18px 38px rgba(0, 0, 0, 0.28);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            background: var(--gray-50);
            color: var(--dark);
            font-family: "Plus Jakarta Sans", Arial, Helvetica, sans-serif;
            overflow-x: hidden;
            transition: background 0.25s ease, color 0.25s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 22px;
            right: 24px;
            z-index: 1040;
            width: 46px;
            height: 46px;
            border: 1px solid rgba(14, 165, 233, 0.25);
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.88);
            color: var(--brand-dark);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: rgba(14, 165, 233, 0.45);
            background: var(--white);
            color: var(--brand-deep);
        }

        .theme-toggle .bi {
            font-size: 1.18rem;
        }

        html[data-theme="dark"] .theme-toggle {
            border-color: rgba(125, 211, 252, 0.25);
            background: rgba(15, 23, 42, 0.82);
            color: #fde68a;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
        }

        .main-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
            min-height: 64px;
            padding: 0 48px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1030;
            transition: box-shadow 0.25s ease;
        }

        .main-nav.scrolled {
            box-shadow: var(--shadow-md);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            justify-self: start;
            min-width: 0;
        }

        .nav-logo-box {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--grad-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 0.78rem;
            font-weight: 800;
            box-shadow: 0 2px 8px rgba(14,165,233,0.4);
            flex: 0 0 36px;
        }

        .nav-logo-copy {
            display: flex;
            flex-direction: column;
            gap: 2px;
            line-height: 1.1;
        }

        .nav-logo-text {
            color: var(--dark);
            font-size: 1rem;
            font-weight: 700;
        }

        .nav-logo-text em {
            color: var(--brand-deep);
            font-style: normal;
        }

        .nav-logo-user {
            color: var(--gray-500);
            font-size: 0.72rem;
            font-weight: 600;
        }

        .nav-logo-role {
            color: var(--brand-deep);
            font-weight: 700;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: var(--gray-700);
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: color 0.2s ease, background 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--brand-deep);
            background: var(--brand-pale);
        }

        .nav-actions {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-auth-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 36px;
            padding: 8px 16px;
            border-radius: 999px;
            border: 0;
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            line-height: 1.2;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, color 0.2s ease;
            white-space: nowrap;
        }

        .nav-auth-btn:hover {
            transform: translateY(-1px);
        }

        .nav-auth-primary {
            background: var(--grad-brand);
            color: var(--white);
            box-shadow: 0 2px 10px rgba(14,165,233,0.35);
        }

        .nav-auth-primary:hover {
            color: var(--white);
            box-shadow: 0 6px 20px rgba(14,165,233,0.45);
        }

        .nav-auth-outline {
            background: transparent;
            border: 1px solid rgba(14,165,233,0.32);
            color: var(--brand-deep);
        }

        .nav-auth-outline:hover {
            background: var(--brand-pale);
            color: var(--brand-deep);
        }

        .nav-auth-logout {
            background: transparent;
            border: 1px solid rgba(239,68,68,0.28);
            color: #dc2626;
        }

        .nav-auth-logout:hover {
            background: #fef2f2;
            color: #dc2626;
        }

        .spa-container {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 34px clamp(28px, 4vw, 72px) 44px;
            flex: 1;
        }

        .dashboard-shell {
            width: 100%;
        }

        .dashboard-hero {
            max-width: min(920px, calc(100% - 74px));
            margin-bottom: 30px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: minmax(260px, 0.82fr) minmax(520px, 1.7fr) minmax(300px, 0.92fr);
            gap: clamp(20px, 2vw, 32px);
            align-items: start;
            width: 100%;
        }

        .dashboard-column {
            min-width: 0;
        }

        .dashboard-side-stack {
            display: grid;
            gap: 24px;
        }

        body[data-view="dashboard"] {
            overflow: hidden;
        }

        body[data-view="dashboard"] .spa-container {
            min-height: 100vh;
            padding: 0;
        }

        body[data-view="dashboard"] footer {
            display: none;
        }

        .dashboard-app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 286px minmax(0, 1fr);
            background: var(--gray-50);
        }

        .app-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 22px;
            overflow-y: auto;
            padding: 26px 22px;
            background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 52%, #1e40af 100%);
            color: #ffffff;
        }

        .app-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
        }

        .app-brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.16);
            color: #ffffff;
            font-weight: 800;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        }

        .app-brand-title {
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.15;
        }

        .app-brand-subtitle {
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .app-sidebar-nav {
            display: grid;
            gap: 6px;
        }

        .app-nav-link {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: transparent;
            color: rgba(255, 255, 255, 0.76);
            font-weight: 800;
            text-align: left;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .app-nav-link:hover,
        .app-nav-link.active {
            background: rgba(255, 255, 255, 0.16);
            color: #ffffff;
        }

        .app-nav-danger {
            margin-top: 8px;
            color: #fee2e2;
        }

        .app-sidebar-section {
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.16);
        }

        .app-sidebar-title {
            margin: 0 0 12px;
            color: #ffffff;
            font-size: 0.88rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .app-status-panel {
            margin-top: auto;
        }

        .app-sidebar .summary-item {
            border-top-color: rgba(255, 255, 255, 0.16);
            color: rgba(255, 255, 255, 0.82);
        }

        .app-sidebar .summary-number {
            color: #ffffff;
        }

        .app-sidebar .new-report-button {
            background: #ffffff;
            color: #1d4ed8;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.18);
        }

        .app-sidebar .new-report-button:hover,
        .app-sidebar .new-report-button:focus {
            color: #1d4ed8;
            background: #ffffff;
        }

        .app-main {
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
            background: var(--gray-50);
        }

        .app-topbar {
            min-height: 86px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 22px clamp(22px, 3vw, 46px);
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
        }

        .app-page-title {
            margin: 0 0 4px;
            color: var(--dark);
            font-size: clamp(1.42rem, 2.1vw, 2rem);
            font-weight: 800;
            line-height: 1.16;
        }

        .app-topbar-logout {
            min-height: 40px;
            border: 1px solid rgba(239, 68, 68, 0.28);
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: transparent;
            color: #dc2626;
            font-weight: 800;
            white-space: nowrap;
        }

        .app-workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 22px;
            padding: 24px clamp(22px, 3vw, 46px) 34px;
        }

        .app-report-area,
        .app-announcement-area {
            min-width: 0;
        }

        .dashboard-app .portal-card,
        .dashboard-app .feed-card,
        .dashboard-app .pagination-bar {
            border-radius: 6px;
            box-shadow: none;
        }

        .dashboard-app .report-card,
        .dashboard-app .feed-card {
            margin-top: 14px;
        }

        .dashboard-app .report-card:hover,
        .dashboard-app .feed-card:hover {
            transform: none;
        }

        .dashboard-app .announcement-card {
            position: sticky;
            top: 24px;
            max-height: calc(100vh - 134px);
            overflow-y: auto;
        }

        body[data-view="dashboard"] .theme-toggle {
            top: auto;
            right: 24px;
            bottom: 24px;
        }

        .portal-card {
            background: var(--white);
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: var(--shadow-panel);
        }

        .dashboard-panel {
            padding: 20px;
        }

        .new-report-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 50px;
            border: 0;
            border-radius: 8px;
            background: var(--grad-brand);
            color: var(--white);
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(14,165,233,0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .new-report-button:hover,
        .new-report-button:focus {
            color: var(--white);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(14,165,233,0.45);
            filter: brightness(1.03);
        }

        .summary-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid var(--gray-200);
            color: var(--gray-700);
            font-size: 0.86rem;
            font-weight: 700;
        }

        .summary-item:first-child {
            border-top: 0;
        }

        .summary-number {
            color: var(--dark);
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .dashboard-tabs {
            display: flex;
            gap: 8px;
            padding: 8px;
            background: var(--brand-pale);
            border: 1px solid #bae6fd;
            border-radius: 8px;
        }

        .dashboard-tab {
            flex: 1;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--gray-700);
            font-size: 0.86rem;
            font-weight: 800;
            min-height: 42px;
            transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
        }

        .dashboard-tab.active {
            background: var(--white);
            color: var(--brand-deep);
            box-shadow: 0 2px 6px rgba(15, 23, 42, 0.08);
        }

        .report-card {
            padding: 18px;
            margin-top: 16px;
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .report-card:hover {
            transform: translateY(-2px);
            border-color: #bfdbfe;
            box-shadow: 0 10px 28px rgba(14,165,233,0.12);
        }

        .report-card-title {
            color: #111827;
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 6px;
            overflow-wrap: anywhere;
        }

        .report-meta {
            color: var(--gray-500);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 7px 10px;
            background: #e0f2fe;
            color: var(--brand-dark);
            font-size: 0.74rem;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .feed-card {
            background: var(--white);
            border: 1px solid rgba(189, 200, 209, 0.48);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0, 58, 93, 0.05);
            padding: 24px;
            margin-top: 16px;
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        }

        .feed-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 101, 141, 0.3);
            box-shadow: 0 8px 24px rgba(0, 58, 93, 0.1);
        }

        .feed-title {
            color: #191c1e;
            font-size: 1.12rem;
            font-weight: 800;
            margin: 0;
            overflow-wrap: anywhere;
            transition: color 0.2s ease;
        }

        .feed-card:hover .feed-title {
            color: #00658d;
        }

        .feed-pill {
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            font-size: 0.74rem;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .feed-pill-reported {
            background: #d6e5ef;
            color: #2d3b43;
        }

        .feed-pill-verified {
            background: #cee5ff;
            color: #1a4a6e;
        }

        .feed-pill-progress {
            background: #a8d3fe;
            color: #2f5b80;
        }

        .feed-pill-resolved {
            background: #c6e7ff;
            color: #004c6b;
        }

        .feed-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 16px;
            margin: 12px 0;
        }

        .feed-meta {
            color: #3e4850;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            font-weight: 700;
        }

        .feed-meta .bi {
            color: #00658d;
            font-size: 0.9rem;
        }

        .feed-description {
            color: #3e4850;
            font-family: "Atkinson Hyperlegible Next", "Plus Jakarta Sans", sans-serif;
            font-size: 0.92rem;
            line-height: 1.58;
            margin: 0 0 16px;
        }

        .feed-location {
            color: #3e4850;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        .feed-progress-label {
            color: #3e4850;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .feed-progress-track {
            width: 100%;
            height: 6px;
            border-radius: 999px;
            background: #e0e3e5;
            overflow: hidden;
        }

        .feed-progress-fill {
            height: 100%;
            border-radius: 999px;
            background: #00658d;
        }

        .progress {
            height: 10px;
            border-radius: 999px;
            background: var(--gray-200);
        }

        .progress-bar {
            background: var(--grad-brand);
        }

        .pagination-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 18px;
            padding: 12px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 999px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
        }

        .pagination-button,
        .pagination-ellipsis {
            min-width: 38px;
            height: 38px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.86rem;
            font-weight: 800;
        }

        .pagination-button {
            border: 1px solid transparent;
            background: transparent;
            color: var(--gray-700);
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .pagination-button:hover:not(:disabled) {
            background: var(--brand-pale);
            color: var(--brand-dark);
            transform: translateY(-1px);
        }

        .pagination-button.active {
            background: var(--grad-brand);
            color: var(--white);
            box-shadow: 0 6px 16px rgba(14,165,233,0.32);
        }

        .pagination-button.nav {
            min-width: 42px;
            padding: 0 14px;
            background: var(--gray-50);
            border-color: var(--gray-200);
        }

        .pagination-button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .pagination-ellipsis {
            color: var(--gray-400);
            min-width: 28px;
        }

        .empty-list {
            min-height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--gray-500);
            font-weight: 600;
        }

        .announcement-card {
            padding: 20px;
            color: var(--dark);
            font-weight: 700;
        }

        .announcement-card .bi {
            color: var(--brand-deep);
        }

        .announcement-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
        }

        .announcement-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            color: var(--dark);
            font-size: 0.98rem;
            font-weight: 800;
        }

        .announcement-count {
            min-width: 28px;
            min-height: 28px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--brand-pale);
            color: var(--brand-dark);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .announcement-list {
            display: grid;
            gap: 10px;

            height: 210px;
            transform: rotate(31deg);
            background: rgba(255, 255, 255, 0.82);

        body[data-view="dashboard"] {
            --dash-bg: #0a0e1a;
            --dash-panel: #0f1422;
            --dash-card: #141929;
            --dash-card-hover: #1a2035;
            --dash-line: rgba(255, 255, 255, 0.07);
            --dash-line-bright: rgba(0, 212, 255, 0.22);
            --dash-cyan: #00d4ff;
            --dash-teal: #00b896;
            --dash-blue: #4d9fff;
            --dash-purple: #8b5cf6;
            --dash-amber: #f59e0b;
            --dash-red: #ef4444;
            --dash-green: #10b981;
            --dash-text: #f0f4ff;
            --dash-muted: #8892b0;
            --dash-soft: #4a5568;
            background: var(--dash-bg);
        }

        body[data-view="dashboard"] .dashboard-app {
            position: relative;
            isolation: isolate;
            background:
                linear-gradient(rgba(0, 212, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.035) 1px, transparent 1px),
                var(--dash-bg);
            background-size: 40px 40px, 40px 40px, auto;
            color: var(--dash-text);
            font-family: "Plus Jakarta Sans", Arial, Helvetica, sans-serif;
        }

        body[data-view="dashboard"] .app-sidebar {
            background: linear-gradient(180deg, #0c1120 0%, #080c18 100%);
            border-right: 1px solid var(--dash-line);
            box-shadow: 18px 0 50px rgba(0, 0, 0, 0.16);
            animation: dash-slide-left 0.58s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes dash-slide-left {
            from {
                opacity: 0;
                transform: translateX(-18px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body[data-view="dashboard"] .app-brand {
            border-bottom-color: var(--dash-line);
        }

        body[data-view="dashboard"] .app-brand-mark {
            border-radius: 10px;
            background: linear-gradient(135deg, var(--dash-cyan), var(--dash-teal));
            color: #07101d;
            box-shadow: 0 0 22px rgba(0, 212, 255, 0.26);
            animation: dash-logo-glow 4s ease-in-out infinite;
        }

        @keyframes dash-logo-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.24);
            }
            50% {
                box-shadow: 0 0 32px rgba(0, 212, 255, 0.42);
            }

        body[data-view="dashboard"] .app-sidebar-title {

            border-radius: 10px;
            color: var(--dash-muted);
            position: relative;
            overflow: hidden;

            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.12), transparent);
            opacity: 0;
            transition: opacity 0.25s ease;

        body[data-view="dashboard"] .app-nav-link > * {

            z-index: 1;

        body[data-view="dashboard"] .app-nav-link:hover,
        body[data-view="dashboard"] .app-nav-link.active {
            border-color: rgba(0, 212, 255, 0.16);

        body[data-view="dashboard"] .app-nav-link:hover::before,

        body[data-view="dashboard"] .app-sidebar-section {
            border-top-color: var(--dash-line);
        }

        body[data-view="dashboard"] .app-sidebar .new-report-button {
            min-height: 46px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--dash-cyan), var(--dash-teal));
            color: #07101d;
            box-shadow: 0 12px 30px rgba(0, 212, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        body[data-view="dashboard"] .app-sidebar .new-report-button::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
            transition: width 0.45s ease, height 0.45s ease;
        }

        body[data-view="dashboard"] .app-sidebar .new-report-button:hover::after {
            width: 230px;
            height: 230px;
        }

        body[data-view="dashboard"] .app-sidebar .new-report-button:hover,
        body[data-view="dashboard"] .app-sidebar .new-report-button:focus {
            color: #07101d;
            background: linear-gradient(135deg, var(--dash-cyan), var(--dash-teal));
            transform: translateY(-1px);
            box-shadow: 0 16px 34px rgba(0, 212, 255, 0.28);
        }

        body[data-view="dashboard"] .app-sidebar .summary-number {
            min-width: 28px;
            border-radius: 999px;
            padding: 2px 8px;
            color: var(--dash-cyan);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.16);
            font-size: 0.86rem;
            text-align: center;
        }

        body[data-view="dashboard"] .app-main {
            background: transparent;
        }

        body[data-view="dashboard"] .app-topbar {
            min-height: 92px;
            background: rgba(10, 14, 26, 0.72);
            border-bottom-color: var(--dash-line);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            animation: dash-fade-down 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.08s both;
        }

        @keyframes dash-fade-down {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body[data-view="dashboard"] .dashboard-kicker {
            color: var(--dash-cyan);
            letter-spacing: 0.14em;
        }

        body[data-view="dashboard"] .app-page-title {
            color: var(--dash-text);
            font-family: "Space Grotesk", "Plus Jakarta Sans", sans-serif;
            font-size: clamp(1.55rem, 2.35vw, 2.35rem);
            letter-spacing: 0;
        }

        body[data-view="dashboard"] .app-topbar .text-secondary {
            color: var(--dash-muted) !important;
        }

        body[data-view="dashboard"] .app-topbar-logout {
            border-color: rgba(239, 68, 68, 0.22);
            background: rgba(239, 68, 68, 0.07);
            color: #f87171;
            border-radius: 8px;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        body[data-view="dashboard"] .app-topbar-logout:hover {
            transform: translateY(-1px);
            border-color: rgba(239, 68, 68, 0.38);
            background: rgba(239, 68, 68, 0.12);
        }

        body[data-view="dashboard"] .app-workspace {
            gap: 0;
            padding: 0;
        }

        body[data-view="dashboard"] .app-report-area {
            min-height: calc(100vh - 92px);
            padding: 18px clamp(18px, 2.2vw, 30px) 34px;
            overflow: hidden;
            animation: dash-fade-up 0.58s cubic-bezier(0.16, 1, 0.3, 1) 0.16s both;
        }

        @keyframes dash-fade-up {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body[data-view="dashboard"] .app-announcement-area {
            min-height: calc(100vh - 92px);
            border-left: 1px solid var(--dash-line);
            padding: 18px 18px 28px;
            animation: dash-fade-right 0.58s cubic-bezier(0.16, 1, 0.3, 1) 0.22s both;
        }

        @keyframes dash-fade-right {
            from {
                opacity: 0;
                transform: translateX(16px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body[data-view="dashboard"] .dashboard-tabs {
            border-color: var(--dash-line);
            border-radius: 10px;
            background: var(--dash-card);
            padding: 4px;
            gap: 4px;
        }

        body[data-view="dashboard"] .dashboard-tab {
            border: 1px solid transparent;
            border-radius: 7px;
            color: var(--dash-muted);
            min-height: 42px;
            font-size: 0.82rem;
            font-family: inherit;
        }

        body[data-view="dashboard"] .dashboard-tab:hover:not(.active) {
            color: var(--dash-text);
            background: rgba(255, 255, 255, 0.04);
        }

        body[data-view="dashboard"] .dashboard-tab.active {
            border-color: rgba(0, 212, 255, 0.22);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.14), rgba(0, 184, 150, 0.1));
            color: var(--dash-cyan);
            box-shadow: 0 0 18px rgba(0, 212, 255, 0.08);
        }

        body[data-view="dashboard"] #reportList {
            max-height: calc(100vh - 196px);
            overflow-y: auto;
            padding-right: 4px;
        }

        body[data-view="dashboard"] #reportList::-webkit-scrollbar,
        body[data-view="dashboard"] .announcement-card::-webkit-scrollbar {
            width: 4px;
        }

        body[data-view="dashboard"] #reportList::-webkit-scrollbar-track,
        body[data-view="dashboard"] .announcement-card::-webkit-scrollbar-track {
            background: transparent;
        }

        body[data-view="dashboard"] #reportList::-webkit-scrollbar-thumb,
        body[data-view="dashboard"] .announcement-card::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 999px;
        }

        body[data-view="dashboard"] .portal-card,
        body[data-view="dashboard"] .feed-card,
        body[data-view="dashboard"] .announcement-card {
            border-color: var(--dash-line);
            background: var(--dash-card);
            color: var(--dash-text);
        }

        body[data-view="dashboard"] .report-card,
        body[data-view="dashboard"] .feed-card {
            border-radius: 14px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            animation: dash-card-enter 0.48s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        body[data-view="dashboard"] .report-card:nth-child(1),
        body[data-view="dashboard"] .feed-card:nth-child(1) {
            animation-delay: 0.08s;
        }

        body[data-view="dashboard"] .report-card:nth-child(2),
        body[data-view="dashboard"] .feed-card:nth-child(2) {
            animation-delay: 0.14s;
        }

        body[data-view="dashboard"] .report-card:nth-child(3),
        body[data-view="dashboard"] .feed-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes dash-card-enter {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.985);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        body[data-view="dashboard"] .report-card::before,
        body[data-view="dashboard"] .feed-card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--dash-cyan), var(--dash-teal));
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        body[data-view="dashboard"] .report-card.status-draft::before {
            background: linear-gradient(180deg, #a78bfa, var(--dash-purple));
        }

        body[data-view="dashboard"] .report-card.status-resolved::before,
        body[data-view="dashboard"] .feed-card.status-resolved::before {
            background: linear-gradient(180deg, var(--dash-teal), var(--dash-cyan));
        }

        body[data-view="dashboard"] .report-card:hover,
        body[data-view="dashboard"] .feed-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 212, 255, 0.17);
            background: var(--dash-card-hover);
            box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
        }

        body[data-view="dashboard"] .report-card:hover::before,
        body[data-view="dashboard"] .feed-card:hover::before {
            opacity: 1;
        }

        body[data-view="dashboard"] .report-card-title,
        body[data-view="dashboard"] .feed-title,
        body[data-view="dashboard"] .announcement-title,
        body[data-view="dashboard"] .announcement-row-title {
            color: var(--dash-text);
        }

        body[data-view="dashboard"] .report-card p,
        body[data-view="dashboard"] .feed-description {
            color: var(--dash-muted);
            font-family: "Atkinson Hyperlegible Next", "Plus Jakarta Sans", sans-serif;
            line-height: 1.56;
        }

        body[data-view="dashboard"] .report-meta,
        body[data-view="dashboard"] .feed-meta,
        body[data-view="dashboard"] .feed-location,
        body[data-view="dashboard"] .feed-progress-label,
        body[data-view="dashboard"] .announcement-desc,
        body[data-view="dashboard"] .announcement-meta {
            color: var(--dash-muted);
        }

        body[data-view="dashboard"] .status-badge,
        body[data-view="dashboard"] .feed-pill {
            border-radius: 999px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.1);
            color: var(--dash-cyan);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        body[data-view="dashboard"] .status-draft .status-badge {
            border-color: rgba(139, 92, 246, 0.28);
            background: rgba(139, 92, 246, 0.14);
            color: #c4b5fd;
        }

        body[data-view="dashboard"] .status-reported .status-badge,
        body[data-view="dashboard"] .feed-pill-reported {
            border-color: rgba(245, 158, 11, 0.28);
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
        }

        body[data-view="dashboard"] .status-verified .status-badge,
        body[data-view="dashboard"] .feed-pill-verified {
            border-color: rgba(16, 185, 129, 0.24);
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
        }

        body[data-view="dashboard"] .status-in-progress .status-badge,
        body[data-view="dashboard"] .feed-pill-progress {
            border-color: rgba(77, 159, 255, 0.24);
            background: rgba(77, 159, 255, 0.12);
            color: #93c5fd;
        }

        body[data-view="dashboard"] .status-resolved .status-badge,
        body[data-view="dashboard"] .feed-pill-resolved {
            border-color: rgba(0, 212, 255, 0.22);
            background: rgba(0, 212, 255, 0.1);
            color: var(--dash-cyan);
        }

        body[data-view="dashboard"] .progress,
        body[data-view="dashboard"] .feed-progress-track {
            height: 5px;
            background: rgba(255, 255, 255, 0.07);
        }

        body[data-view="dashboard"] .progress-bar,
        body[data-view="dashboard"] .feed-progress-fill {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, var(--dash-teal), var(--dash-cyan));
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.38);
        }

        body[data-view="dashboard"] .progress-bar::after,
        body[data-view="dashboard"] .feed-progress-fill::after {
            content: "";
            position: absolute;
            top: 0;
            left: -80%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: dash-shimmer 2.3s infinite;
        }

        @keyframes dash-shimmer {
            to {
                left: 140%;
            }
        }

        body[data-view="dashboard"] .btn-outline-primary {
            border-color: rgba(0, 212, 255, 0.24);
            color: var(--dash-cyan);
            background: rgba(0, 212, 255, 0.06);
        }

        body[data-view="dashboard"] .btn-outline-primary:hover {
            border-color: rgba(0, 212, 255, 0.36);
            color: var(--dash-cyan);
            background: rgba(0, 212, 255, 0.12);
            transform: scale(1.02);
        }

        body[data-view="dashboard"] .announcement-card {
            border-radius: 0;
            border: 0;
            border-left: 1px solid var(--dash-line);
            background: transparent;
            box-shadow: none;
        }

        body[data-view="dashboard"] .announcement-count {
            border: 1px solid rgba(0, 212, 255, 0.22);
            background: rgba(0, 212, 255, 0.12);
            color: var(--dash-cyan);
        }

        body[data-view="dashboard"] .announcement-row {
            grid-template-columns: 34px minmax(0, 1fr);
            border-radius: 10px;
            border-color: var(--dash-line);
            background: var(--dash-card);
            transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
            animation: dash-card-enter 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        body[data-view="dashboard"] .announcement-row:nth-child(1) {
            animation-delay: 0.16s;
        }

        body[data-view="dashboard"] .announcement-row:nth-child(2) {
            animation-delay: 0.22s;
        }

        body[data-view="dashboard"] .announcement-row:nth-child(3) {
            animation-delay: 0.28s;
        }

        body[data-view="dashboard"] .announcement-row:hover {
            transform: translateX(2px);
            border-color: rgba(255, 255, 255, 0.12);
            background: var(--dash-card-hover);
        }

        body[data-view="dashboard"] .announcement-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            box-shadow: none;
        }

        body[data-view="dashboard"] .announcement-badge {
            border-radius: 5px;
            letter-spacing: 0.03em;
        }

        body[data-view="dashboard"] .pagination-bar {
            border-color: var(--dash-line);
            background: var(--dash-card);
            border-radius: 12px;
        }

        body[data-view="dashboard"] .pagination-button {
            color: var(--dash-muted);
        }

        body[data-view="dashboard"] .pagination-button:hover:not(:disabled),
        body[data-view="dashboard"] .pagination-button.active {
            background: rgba(0, 212, 255, 0.12);
            color: var(--dash-cyan);
        }

        body[data-view="dashboard"] .empty-list,
        body[data-view="dashboard"] .announcement-empty {
            border-color: var(--dash-line);
            background: rgba(20, 25, 41, 0.65);
            color: var(--dash-muted);
        }

        html[data-theme="light"] body[data-view="dashboard"] {
            --dash-bg: #eef6fb;
            --dash-panel: #ffffff;
            --dash-card: #ffffff;
            --dash-card-hover: #f8fcff;
            --dash-line: rgba(2, 132, 199, 0.14);
            --dash-line-bright: rgba(2, 132, 199, 0.28);
            --dash-cyan: #0284c7;
            --dash-teal: #059669;
            --dash-blue: #2563eb;
            --dash-text: #0f172a;
            --dash-muted: #526173;
            --dash-soft: #94a3b8;
        }

        html[data-theme="light"] body[data-view="dashboard"] .dashboard-app {
            background:
                linear-gradient(rgba(2, 132, 199, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(2, 132, 199, 0.035) 1px, transparent 1px),
                var(--dash-bg);
            background-size: 40px 40px, 40px 40px, auto;
        }

        html[data-theme="light"] body[data-view="dashboard"] .app-sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #1d4ed8 100%);
        }

        html[data-theme="light"] body[data-view="dashboard"] .app-topbar {
            background: rgba(255, 255, 255, 0.84);
        }

        html[data-theme="light"] body[data-view="dashboard"] .portal-card,
        html[data-theme="light"] body[data-view="dashboard"] .feed-card,
        html[data-theme="light"] body[data-view="dashboard"] .announcement-row,
        html[data-theme="light"] body[data-view="dashboard"] .dashboard-tabs,
        html[data-theme="light"] body[data-view="dashboard"] .pagination-bar {
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        @media (max-width: 1199.98px) {
            .dashboard-layout {
                grid-template-columns: minmax(240px, 0.8fr) minmax(0, 1.4fr);
            }

            .dashboard-layout > .dashboard-column:last-child {
                grid-column: 1 / -1;
            }

            .app-workspace {
                grid-template-columns: 1fr;
            }

            .dashboard-app .announcement-card {
                position: static;
                max-height: none;
            }
        }

        @media (max-width: 991.98px) {
            body[data-view="dashboard"] {
                overflow: auto;
            }

            .main-nav {
                grid-template-columns: 1fr auto;
                padding: 12px 18px;
                gap: 14px;
            }

            .nav-links {
                display: none;
            }

            .nav-actions {
                justify-self: end;
            }

            .nav-auth-btn {
                min-height: 34px;
                padding: 7px 12px;
            }

            .spa-container {
                padding: 26px 18px 36px;
            }

            .dashboard-hero {
                max-width: 100%;
            }

            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            .dashboard-app {
                display: block;
                min-height: 100vh;
            }

            .app-sidebar {
                position: relative;
                height: auto;
                padding: 22px 18px;
            }

            .app-status-panel {
                margin-top: 0;
            }

            .app-main {
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }

            .app-topbar {
                align-items: flex-start;
                flex-direction: column;
                padding: 22px 18px;
            }

            .app-workspace {
                padding: 20px 18px 30px;
            }

            footer {
                padding: 16px 18px;
                flex-direction: column;
                gap: 6px;
                text-align: center;
            }
        }

        @media (max-width: 575.98px) {
            .nav-logo-user {
                display: none;
            }

            .nav-actions .nav-auth-outline {
                display: none;
            }

            .dashboard-tabs {
                flex-direction: column;
            }

            .pagination-bar {
                border-radius: 18px;
            }

            .pagination-button,
            .pagination-ellipsis {
                min-width: 34px;
                height: 34px;
            }

            .report-modal-body {
                padding: 22px 18px;
            }

            .report-form-row {
                grid-template-columns: 1fr;
            }

            .report-modal-footer {
                padding: 16px 18px 20px;
                flex-direction: column-reverse;
            }

            .report-modal-footer .btn {
                width: 100%;
            }

            body[data-view="dashboard"] .theme-toggle {
                right: 18px;
                bottom: 18px;
            }
        }
    </style>
</head>
<body>
    <main class="spa-container" id="app-content"></main>

    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Ganti ke mode gelap" title="Ganti mode tampilan">
        <i class="bi bi-moon-stars-fill" id="themeToggleIcon"></i>
    </button>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog report-modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content report-modal-content">
                <div class="modal-header">
                    <div class="d-flex align-items-center gap-2 min-w-0">
                        <button type="button" class="report-back-btn" data-bs-dismiss="modal" aria-label="Tutup">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        <div class="report-modal-brand">
                            <i class="bi bi-buildings"></i>
                            <span>SmartReport</span>
                        </div>
                    </div>
                    <button type="button" class="report-help-btn" data-bs-dismiss="modal" aria-label="Tutup">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <div class="modal-body report-modal-body">
                    <div class="report-modal-intro">
                        <span class="report-modal-kicker">Sampaikan Aspirasi</span>
                        <h5 class="report-modal-title" id="reportModalLabel">Laporan Baru</h5>
                        <p class="report-modal-help">
                            Bantu kami meningkatkan kualitas layanan kota dengan melaporkan permasalahan di sekitar Anda.
                        </p>
                    </div>

                    <form id="reportForm" class="report-form-grid">
                        <div>
                            <label for="reportTitle" class="report-field-label">Judul Laporan</label>
                            <div class="report-input-shell">
                                <input type="text" id="reportTitle" class="form-control" maxlength="200" placeholder="Contoh: Lampu jalan mati" required>
                            </div>
                        </div>

                        <div class="report-form-row">
                            <div>
                                <label for="reportCategory" class="report-field-label">Kategori</label>
                                <div class="report-input-shell">
                                    <select id="reportCategory" class="form-select" required>
                                        <option value="INFRASTRUCTURE">Infrastruktur & Jalan</option>
                                        <option value="SECURITY">Keamanan</option>
                                        <option value="HEALTH">Kesehatan</option>
                                        <option value="ENVIRONMENT">Lingkungan & Kebersihan</option>
                                        <option value="PUBLIC_FACILITY">Fasilitas Publik</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label for="reportLocation" class="report-field-label">Lokasi Kejadian</label>
                                <div class="report-input-shell">
                                    <i class="bi bi-geo-alt-fill"></i>
                                    <input type="text" id="reportLocation" class="form-control" maxlength="200" placeholder="Tentukan lokasi kejadian" required>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label for="reportDescription" class="report-field-label">Deskripsi Lengkap</label>
                            <div class="report-input-shell align-items-start">
                                <textarea id="reportDescription" class="form-control" rows="5" placeholder="Ceritakan detail permasalahan..." required></textarea>
                            </div>
                        </div>

                        <div>
                            <div class="report-map-preview" aria-hidden="true">
                                <span class="report-map-marker">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </span>
                            </div>
                        </div>

                        <div>
                            <label for="reportPhotoInput" class="report-field-label">Foto Bukti</label>
                            <div class="report-photo-row">
                                <label class="report-photo-tile" for="reportPhotoInput">
                                    <i class="bi bi-camera-fill"></i>
                                    <span>Tambah</span>
                                </label>
                                <input type="file" id="reportPhotoInput" class="d-none" accept="image/*">
                                <div class="report-photo-preview" id="reportPhotoPreview" aria-live="polite">
                                    <img id="reportPhotoPreviewImage" src="" alt="Preview foto bukti">
                                </div>
                            </div>
                        </div>

                        <div class="report-anonymous-option">
                            <input class="form-check-input" type="checkbox" id="reportAnonymous">
                            <label for="reportAnonymous">Sembunyikan identitas pelapor</label>
                        </div>
                    </form>
                </div>

                <div class="modal-footer report-modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-outline-primary" id="saveDraftBtn">
                        <i class="bi bi-save me-1"></i>Simpan Draft
                    </button>
                    <button type="button" class="btn btn-primary" id="submitReportBtn">
                        <i class="bi bi-send-fill me-1"></i>Kirim Laporan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const toggle = document.getElementById("themeToggle");
            const icon = document.getElementById("themeToggleIcon");

            function setTheme(theme) {
                const nextTheme = theme === "dark" ? "dark" : "light";
                document.documentElement.dataset.theme = nextTheme;
                localStorage.setItem("smartreport_theme", nextTheme);

                if (icon) {
                    icon.className = nextTheme === "dark"
                        ? "bi bi-sun-fill"
                        : "bi bi-moon-stars-fill";
                }

                if (toggle) {
                    toggle.setAttribute(
                        "aria-label",
                        nextTheme === "dark" ? "Ganti ke mode terang" : "Ganti ke mode gelap"
                    );
                    toggle.setAttribute("aria-pressed", nextTheme === "dark" ? "true" : "false");
                }
            }

            setTheme(document.documentElement.dataset.theme);

            if (toggle) {
                toggle.addEventListener("click", function () {
                    const currentTheme = document.documentElement.dataset.theme;
                    setTheme(currentTheme === "dark" ? "light" : "dark");
                });
            }
        })();
    </script>
